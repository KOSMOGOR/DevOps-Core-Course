apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "devops-info.fullname" . }}
  labels:
    {{- include "devops-info.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "devops-info.labels" . | nindent 6 }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        {{- include "devops-info.labels" . | nindent 8 }}
      annotations:
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- if .Values.vault.enabled }}
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: {{ .Values.vault.role | quote }}
        vault.hashicorp.com/agent-inject-secret-config: {{ .Values.vault.secretPath | quote }}
        vault.hashicorp.com/agent-inject-template-appconfig: |
          {{ .Values.vault.template | trim | nindent 10 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "devops-info.serviceAccountName" . }}
      {{- include "common-lib.security.context" .Values.podSecurityContext | nindent 6 }}
      containers:
        - name: {{ .Chart.Name }}
          {{- include "common-lib.security.context" .Values.securityContext | nindent 10 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
              protocol: TCP
          env:
          {{- range $key, $value := .Values.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
          {{- end }}
          envFrom:
            - configMapRef:
                name: {{ include "devops-info.fullname" . }}-env
            - secretRef:
                name: {{ include "devops-info.fullname" . }}-secret
          volumeMounts:
            - name: config-volume
              mountPath: {{ .Values.config.mountPath | quote }}
              readOnly: true
            {{- if .Values.persistence.enabled }}
            - name: data-volume
              mountPath: {{ .Values.persistence.mountPath | quote }}
            {{- end }}
          {{- include "common-lib.resources" .Values.resources | nindent 10 }}
          {{- include "common-lib.probes.liveness" .Values.livenessProbe | nindent 10 }}
          {{- include "common-lib.probes.readiness" .Values.readinessProbe | nindent 10 }}
        {{- with .Values.nodeSelector }}
        nodeSelector:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        {{- with .Values.affinity }}
        affinity:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        {{- with .Values.tolerations }}
        tolerations:
          {{- toYaml . | nindent 10 }}
        {{- end }}
      volumes:
        - name: config-volume
          configMap:
            name: {{ include "devops-info.fullname" . }}-config
        - name: data-volume
          persistentVolumeClaim:
            claimName: {{ include "devops-info.fullname" . }}-pvc