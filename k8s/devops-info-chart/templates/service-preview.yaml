{{- if and .Values.rollout.enabled (eq .Values.rollout.strategy "blueGreen") }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "devops-info.fullname" . }}-preview
  labels:
    {{- include "devops-info.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "devops-info.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      protocol: TCP
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
{{- end }}