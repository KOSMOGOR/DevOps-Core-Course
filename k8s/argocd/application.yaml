apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd-devops-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/KOSMOGOR/DevOps-Core-Course.git
    targetRevision: lab13
    path: k8s/devops-info-chart
    helm:
      releaseName: devops-info
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    syncOptions:
      - CreateNamespace=true