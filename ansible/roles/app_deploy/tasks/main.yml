---
- name: Log in to Docker Hub
  community.docker.docker_login:
    username: "{{ dockerhub_username }}"
    password: "{{ dockerhub_password }}"
    registry_url: https://index.docker.io/v1/
  no_log: true

- name: Pull Docker image
  community.docker.docker_image:
    name: "{{ docker_image }}"
    tag: "{{ docker_image_tag }}"
    source: pull
    force_source: yes

- name: Stop (if running) and remove old (if exists) container
  community.docker.docker_container:
    name: "{{ app_container_name }}"
    state: absent
  ignore_errors: yes

- name: Start new container
  community.docker.docker_container:
    name: "{{ app_container_name }}"
    image: "{{ docker_image }}:{{ docker_image_tag }}"
    state: started
    restart_policy: "{{ app_restart_policy }}"
    ports:
      - "{{ app_port }}:{{ app_port }}"
    env: "{{ app_environment_vars | default({}) }}"
  notify: restart app

- name: Wait for application port to be available
  wait_for:
    port: "{{ app_port }}"
    delay: 5
    timeout: 60
    state: started

- name: Verify health endpoint
  uri:
    url: "http://localhost:{{ app_port }}{{ app_healthcheck_path }}"
    method: GET
    status_code: 200
    timeout: 10
  register: health_check
  retries: 5
  delay: 5
  until: health_check.status == 200