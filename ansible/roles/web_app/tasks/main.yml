---
- name: Include wipe tasks
  ansible.builtin.include_tasks: wipe.yml
  tags:
    - web_app_wipe

- name: Deploy application with Docker Compose
  tags:
    - web_app_deploy
    - compose
  block:
    - name: Create application directory
      ansible.builtin.file:
        path: "{{ web_app_dir }}"
        state: directory
        mode: "0755"

    - name: Template docker-compose file
      ansible.builtin.template:
        src: docker-compose.yml.j2
        dest: "{{ web_app_dir }}/docker-compose.yml"
        mode: "0644"

    - name: Start docker-compose project
      community.docker.docker_compose_v2:
        project_src: "{{ compose_project_dir }}"
        state: present
        pull: always
        recreate: auto
      register: web_app_compose_result

    - name: Wait for application port to be available
      ansible.builtin.wait_for:
        port: "{{ web_app_port }}"
        delay: 5
        timeout: 60
        state: started

    - name: Verify health endpoint
      ansible.builtin.uri:
        url: "http://localhost:{{ web_app_port }}{{ web_app_healthcheck_path }}"
        method: GET
        status_code: 200
        timeout: 10
      register: web_app_health_check
      retries: 5
      delay: 5
      until: health_check.status == 200

  rescue:
    - name: Log deployment failure
      ansible.builtin.debug:
        msg: "Deployment of {{ web_app_name }} failed"