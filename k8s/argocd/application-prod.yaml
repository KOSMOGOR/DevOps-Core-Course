apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd-devops-app-prod
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/KOSMOGOR/DevOps-Core-Course.git
    targetRevision: lab13
    path: k8s/devops-info-chart
    helm:
      releaseName: devops-info-prod
      valueFiles:
        - values-prod.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true